<script>
function switchTab(name) {
  var tabs = document.querySelectorAll('.nav-tab');
  var contents = document.querySelectorAll('.sidebar-content');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
  event.target.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}
function toggleTree(el) {
  var children = el.parentElement.querySelector('.tree-children');
  if (children) {
    children.classList.toggle('collapsed');
    el.innerHTML = children.classList.contains('collapsed') ? '&#9654;' : '&#9660;';
  }
}
function filterTree() {
  var f = document.getElementById('sidebar-filter').value.toLowerCase();
  var panels = document.querySelectorAll('.sidebar-content');
  for (var p = 0; p < panels.length; p++) {
    var items = panels[p].querySelectorAll('.tree-item');
    for (var i = 0; i < items.length; i++) {
      var link = items[i].querySelector('.tree-link');
      if (!link) continue;
      var txt = link.textContent.toLowerCase();
      if (f === '' || txt.indexOf(f) >= 0) {
        items[i].style.display = '';
        var par = items[i].parentElement;
        while (par && par.classList) {
          if (par.classList.contains('tree-children'))
            par.classList.remove('collapsed');
          par = par.parentElement;
        }
      } else {
        items[i].style.display = 'none';
      }
    }
  }
}
